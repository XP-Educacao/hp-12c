<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HP-12C Financial Calculator</title>
  <link rel="icon" href="favicon.png">
  <link rel="stylesheet" href="css/hp1xc.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100%;
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
    }

    /* ── wrapper scales the whole calc ── */
    #adcontainer {
      position: relative;
      display: inline-block;
    }

    #close-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 10;
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 8px rgba(0,0,0,0.35);
    }

    #close-btn:hover {
      background: rgba(200, 0, 0, 0.9);
    }

    /* pointer_div: sized to 700×438 (the JS coord system) */
    #pointer_div {
      position: relative;
      width: 700px;
      height: 438px;
    }

    #pointer_div img#cross {
      display: block;
      width: 700px;
      height: 438px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── LCD display overlay ── */
    #lcd-overlay {
      position: absolute;
      top: 805px;
      left: 44px;
      width: 560px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      pointer-events: none;
      transition: transform 0.2s ease-in-out;
      transform-origin: right center;
    }

    /* Each digit: 7-segment SVG */
    .lcd-digit {
      position: relative;
      width: 36px;
      height: 52px;
      margin-right: 2px;
      flex-shrink: 0;
    }

    .lcd-digit svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    /* segment colours */
    .seg { fill: #00cc00; }
    .seg-off { fill: #003300; }

    /* status indicators row */
    #status-row {
      position: absolute;
      top: 72px;
      left: 44px;
      width: 560px;
      height: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      pointer-events: none;
    }

    .indicator {
      font-size: 9px;
      color: #003300;
      font-family: monospace;
      font-weight: bold;
      visibility: hidden;
    }

    /* hidden input the JS touches */
    input#display { visibility: hidden; position: absolute; }

    /* responsive scaling */
    @media (max-width: 740px) {
      #pointer_div,
      #pointer_div img#cross {
        width: 100vw;
        height: calc(100vw * 438 / 700);
      }
      #lcd-overlay {
        width: calc(100vw * 560 / 700);
        left: calc(100vw * 44 / 700);
        top: calc(100vw * 18 / 700);
        height: calc(100vw * 52 / 700);
      }
      .lcd-digit {
        width: calc(100vw * 36 / 700);
        height: calc(100vw * 52 / 700);
      }
    }
  </style>
</head>

<script>
  // The JS reads pointer_div.style.width/height — set them explicitly
  (function () {
    var pd = document.getElementById('pointer_div');
    // Use actual rendered size so kx/ky scaling is correct
    function setSize() {
      // keep 700×438 unless viewport is narrow
      var maxW = Math.min(700, window.innerWidth - 20);
      var h    = Math.round(maxW * 438 / 700);
      pd.style.width  = maxW + 'px';
      pd.style.height = h    + 'px';
      var img = document.getElementById('cross');
      img.style.width  = maxW + 'px';
      img.style.height = h    + 'px';
      // re-scale the LCD overlay
      var scale = maxW / 700;
      var overlay = document.getElementById('lcd-overlay');
      overlay.style.left   = Math.round(44  * scale) + 'px';
      overlay.style.top    = Math.round(55  * scale) + 'px';
      overlay.style.width  = Math.round(480 * scale) + 'px';
      overlay.style.height = Math.round(52  * scale) + 'px';
      var digits = document.querySelectorAll('.lcd-digit');
      digits.forEach(function(d) {
        d.style.width  = Math.round(28 * scale) + 'px';
        d.style.height = Math.round(40 * scale) + 'px';
      });
    }
    setSize();
    window.addEventListener('resize', setSize);

    var closeBtn = document.getElementById('close-btn');
    if (closeBtn) {
      closeBtn.addEventListener('click', function () {
        window.close();
        // Fallback se o navegador bloquear window.close()
        window.location.href = 'about:blank';
      });
    }
  })();
</script>
